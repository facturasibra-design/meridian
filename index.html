<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meridian</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:         #f5f3ef;
      --surface:    #fffefb;
      --border:     #e8e4dc;
      --text:       #2a2520;
      --muted:      #9a9088;
      --accent:     #7eb8a4;       /* sage green */
      --accent2:    #e8a598;       /* dusty rose — comisión */
      --accent3:    #a8c4e0;       /* soft blue — cliente */
      --positive:   #7eb8a4;
      --negative:   #e8a598;
      --shadow:     0 2px 16px rgba(42,37,32,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 28px 40px 24px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .brand h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .brand span {
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .last-updated {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── LAYOUT ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 24px 0;
    }

    /* ── KPI CARDS ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    @media (max-width: 640px) {
      .kpi-grid { grid-template-columns: 1fr; }
      header { padding: 20px 20px 16px; }
      .container { padding: 24px 16px 0; }
    }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 24px 20px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 0.5s forwards;
    }

    .kpi-card:nth-child(1) { animation-delay: 0.05s; }
    .kpi-card:nth-child(2) { animation-delay: 0.12s; }
    .kpi-card:nth-child(3) { animation-delay: 0.19s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .kpi-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .kpi-value {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .kpi-value.positive { color: var(--positive); }
    .kpi-value.negative { color: var(--negative); }
    .kpi-value.neutral  { color: var(--text); }

    .kpi-sub {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 300;
    }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filters label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .filters input[type="date"] {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
      padding: 6px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .filters input[type="date"]:focus {
      border-color: var(--accent);
    }

    .btn-reset {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-reset:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── CHART CARDS ── */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 28px 20px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 0.5s forwards;
    }

    .chart-card:nth-of-type(1) { animation-delay: 0.28s; }
    .chart-card:nth-of-type(2) { animation-delay: 0.38s; }

    .chart-title {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .chart-wrap {
      position: relative;
      height: 280px;
    }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      gap: 20px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Meridian</h1>
    <span>Strategy Performance</span>
  </div>
  <div class="last-updated" id="lastUpdated">Cargando...</div>
</header>

<div class="container">

  <!-- KPIs -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">Ganancia hoy</div>
      <div class="kpi-value neutral" id="kpiToday">—</div>
      <div class="kpi-sub" id="kpiTodayDate">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Acumulado del mes</div>
      <div class="kpi-value neutral" id="kpiMonth">—</div>
      <div class="kpi-sub" id="kpiMonthLabel">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Acumulado total</div>
      <div class="kpi-value neutral" id="kpiTotal">—</div>
      <div class="kpi-sub" id="kpiInception">—</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <label>Desde</label>
    <input type="date" id="filterFrom" />
    <label>Hasta</label>
    <input type="date" id="filterTo" />
    <button class="btn-reset" id="btnReset">Limpiar</button>
  </div>

  <!-- Line chart: cumulative % -->
  <div class="chart-card">
    <div class="chart-title">Rendimiento acumulado</div>
    <div class="chart-wrap">
      <canvas id="lineChart"></canvas>
    </div>
  </div>

  <!-- Bar chart: monthly % -->
  <div class="chart-card">
    <div class="chart-title">Rendimiento por mes</div>
    <div class="chart-wrap">
      <canvas id="barChart"></canvas>
    </div>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--accent3);"></div>
        Rendimiento neto
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--accent2);"></div>
        Comisión (20%)
      </div>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// DATA SOURCE
// ─────────────────────────────────────────────
const PERFORMANCE_URL = 'performance.json';
const COMMISSION_RATE = 0.20;

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
const fmt = (n) => (n >= 0 ? '+' : '') + n.toFixed(2) + '%';

function monthLabel(dateStr) {
  const [y, m] = dateStr.split('-');
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return months[parseInt(m) - 1] + ' ' + y.slice(2);
}

function formatDateTime(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr);
  return d.toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' })
    + ' · ' + d.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
}

function setKpi(id, value, classOverride) {
  const el = document.getElementById(id);
  el.textContent = value;
  el.className = 'kpi-value ' + (classOverride || (parseFloat(value) >= 0 ? 'positive' : 'negative'));
}

// ─────────────────────────────────────────────
// MONTHLY AGGREGATION
// ─────────────────────────────────────────────
function aggregateByMonth(snapshots) {
  // Group snapshots by YYYY-MM
  const map = {};
  snapshots.forEach(s => {
    const key = s.date.slice(0, 7);
    if (!map[key]) map[key] = [];
    map[key].push(s);
  });

  return Object.entries(map).map(([key, entries]) => {
    // Monthly % = sum of daily % for that month
    const total = entries.reduce((acc, e) => acc + e.daily_pct, 0);
    return { month: key, total: parseFloat(total.toFixed(4)) };
  });
}

// ─────────────────────────────────────────────
// CHARTS
// ─────────────────────────────────────────────
let lineChart, barChart;

function buildLineChart(snapshots) {
  const ctx = document.getElementById('lineChart').getContext('2d');

  const labels = snapshots.map(s => s.date);
  const values = snapshots.map(s => s.cumulative_pct);

  const grad = ctx.createLinearGradient(0, 0, 0, 280);
  grad.addColorStop(0, 'rgba(126,184,164,0.25)');
  grad.addColorStop(1, 'rgba(126,184,164,0)');

  if (lineChart) lineChart.destroy();

  lineChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: '#7eb8a4',
        borderWidth: 2,
        backgroundColor: grad,
        fill: true,
        tension: 0.35,
        pointRadius: 4,
        pointBackgroundColor: '#7eb8a4',
        pointBorderColor: '#fffefb',
        pointBorderWidth: 2,
        pointHoverRadius: 6,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fffefb',
          borderColor: '#e8e4dc',
          borderWidth: 1,
          titleColor: '#9a9088',
          bodyColor: '#2a2520',
          titleFont: { family: 'DM Sans', size: 11 },
          bodyFont: { family: 'DM Serif Display', size: 16 },
          callbacks: {
            title: (items) => items[0].label,
            label: (item) => fmt(item.raw),
          }
        }
      },
      scales: {
        x: {
          grid: { color: '#f0ece4' },
          ticks: {
            font: { family: 'DM Sans', size: 11 },
            color: '#9a9088',
            maxTicksLimit: 10,
          }
        },
        y: {
          grid: { color: '#f0ece4' },
          ticks: {
            font: { family: 'DM Sans', size: 11 },
            color: '#9a9088',
            callback: (v) => v.toFixed(1) + '%',
          }
        }
      }
    }
  });
}

function buildBarChart(monthly) {
  const ctx = document.getElementById('barChart').getContext('2d');

  const labels       = monthly.map(m => monthLabel(m.month + '-01'));
  const commission   = monthly.map(m => parseFloat((m.total * COMMISSION_RATE).toFixed(4)));
  const net          = monthly.map(m => parseFloat((m.total * (1 - COMMISSION_RATE)).toFixed(4)));

  if (barChart) barChart.destroy();

  barChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Comisión (20%)',
          data: commission,
          backgroundColor: '#e8a598',
          borderRadius: 0,
          stack: 'stack',
        },
        {
          label: 'Rendimiento neto',
          data: net,
          backgroundColor: '#a8c4e0',
          borderRadius: { topLeft: 6, topRight: 6 },
          stack: 'stack',
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fffefb',
          borderColor: '#e8e4dc',
          borderWidth: 1,
          titleColor: '#9a9088',
          bodyColor: '#2a2520',
          titleFont: { family: 'DM Sans', size: 11 },
          bodyFont: { family: 'DM Sans', size: 13 },
          callbacks: {
            label: (item) => item.dataset.label + ': ' + fmt(item.raw),
          }
        }
      },
      scales: {
        x: {
          stacked: true,
          grid: { display: false },
          ticks: { font: { family: 'DM Sans', size: 11 }, color: '#9a9088' }
        },
        y: {
          stacked: true,
          grid: { color: '#f0ece4' },
          ticks: {
            font: { family: 'DM Sans', size: 11 },
            color: '#9a9088',
            callback: (v) => v.toFixed(1) + '%',
          }
        }
      }
    }
  });
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render(data, from, to) {
  let snapshots = data.snapshots;

  // Apply date filters
  if (from) snapshots = snapshots.filter(s => s.date >= from);
  if (to)   snapshots = snapshots.filter(s => s.date <= to);

  if (snapshots.length === 0) {
    document.getElementById('kpiToday').textContent = '—';
    document.getElementById('kpiMonth').textContent = '—';
    document.getElementById('kpiTotal').textContent = '—';
    return;
  }

  // ── KPIs ──
  const last     = snapshots[snapshots.length - 1];
  const todayPct = last.daily_pct;
  const totalPct = last.cumulative_pct;

  // Month accumulation: sum daily_pct for current month in filtered set
  const currentMonth = last.date.slice(0, 7);
  const monthPct = snapshots
    .filter(s => s.date.startsWith(currentMonth))
    .reduce((acc, s) => acc + s.daily_pct, 0);

  setKpi('kpiToday', fmt(todayPct));
  document.getElementById('kpiTodayDate').textContent = last.date;

  setKpi('kpiMonth', fmt(parseFloat(monthPct.toFixed(2))));
  document.getElementById('kpiMonthLabel').textContent = monthLabel(currentMonth + '-01');

  setKpi('kpiTotal', fmt(parseFloat(totalPct.toFixed(2))));
  document.getElementById('kpiInception').textContent = 'desde ' + data.inception_date;

  // ── CHARTS ──
  buildLineChart(snapshots);
  buildBarChart(aggregateByMonth(snapshots));
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
let globalData = null;

async function init() {
  try {
    const res  = await fetch(PERFORMANCE_URL + '?t=' + Date.now());
    const data = await res.json();
    globalData = data;

    // Last updated
    document.getElementById('lastUpdated').textContent =
      'Última actualización: ' + formatDateTime(data.last_updated);

    // Set default filter range to inception → today
    const allDates = data.snapshots.map(s => s.date).sort();
    document.getElementById('filterFrom').value = allDates[0] || '';
    document.getElementById('filterTo').value   = allDates[allDates.length - 1] || '';

    render(data, null, null);

  } catch (e) {
    console.error('Error loading performance.json', e);
    document.getElementById('lastUpdated').textContent = 'Error al cargar datos';
  }
}

// ── FILTER EVENTS ──
function applyFilters() {
  if (!globalData) return;
  const from = document.getElementById('filterFrom').value || null;
  const to   = document.getElementById('filterTo').value   || null;
  render(globalData, from, to);
}

document.getElementById('filterFrom').addEventListener('change', applyFilters);
document.getElementById('filterTo').addEventListener('change', applyFilters);
document.getElementById('btnReset').addEventListener('click', () => {
  const allDates = globalData.snapshots.map(s => s.date).sort();
  document.getElementById('filterFrom').value = allDates[0] || '';
  document.getElementById('filterTo').value   = allDates[allDates.length - 1] || '';
  render(globalData, null, null);
});

init();
</script>
</body>
</html>
